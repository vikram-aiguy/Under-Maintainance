<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SYS // MAINTENANCE</title>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100;0,200;0,300;0,400;0,600;1,100&family=Space+Mono:wght@400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06060a;
  --ink:#f0eee6;
  --y:#ffe600;
  --p:#ff2d78;
  --c:#00d4ff;
  --g:#00ff94;
  --o:#ff7a00;
  --muted:rgba(240,238,230,0.3);
  --line:rgba(240,238,230,0.08);
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg)}
body{font-family:'Space Mono',monospace;color:var(--ink)}

/* ── CANVAS BG ── */
canvas{position:fixed;inset:0;z-index:0;pointer-events:none}

/* ── FULL LAYOUT ── */
.layout{
  position:fixed;inset:0;z-index:10;
  display:grid;
  grid-template-columns:1fr 1px 1fr;
}

/* vertical divider */
.vdiv{
  background:linear-gradient(180deg,transparent 0%,var(--c) 30%,var(--p) 70%,transparent 100%);
  opacity:.25;
  animation:divGlitch 4.5s infinite;
}
@keyframes divGlitch{
  0%,90%,100%{opacity:.25;transform:none}
  91%{opacity:.6;transform:scaleY(1.01) translateY(-2px)}
  93%{opacity:.25;transform:none}
  96%{opacity:.5;transform:scaleY(.99) translateY(1px)}
  97%{opacity:.25;transform:none}
}

/* ── LEFT PANEL: geometric viz ── */
.left{
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}

.geo-wrap{
  position:relative;
  width:min(340px,40vw);
  height:min(340px,40vw);
  opacity:0;animation:fadeIn .8s .2s forwards;
}
@keyframes fadeIn{to{opacity:1}}

.geo-wrap svg{width:100%;height:100%;overflow:visible}

/* rotating rings */
.ring-outer{animation:spinCW 18s linear infinite}
.ring-mid  {animation:spinCCW 12s linear infinite}
.ring-inner{animation:spinCW 8s linear infinite}
@keyframes spinCW {from{transform-origin:center;transform:rotate(0deg)}  to{transform-origin:center;transform:rotate(360deg)}}
@keyframes spinCCW{from{transform-origin:center;transform:rotate(0deg)}  to{transform-origin:center;transform:rotate(-360deg)}}

/* center pulse */
.center-dot{animation:centerPulse 2.5s ease-in-out infinite}
@keyframes centerPulse{
  0%,100%{r:4;opacity:1}
  50%{r:7;opacity:.4}
}

/* orbiting dots */
.orbit-dot{animation:orbitPulse 1.8s ease-in-out infinite}
@keyframes orbitPulse{0%,100%{opacity:1}50%{opacity:.2}}

/* corner label on left */
.left-tag{
  position:absolute;bottom:1.8rem;left:1.8rem;
  font-size:.42rem;letter-spacing:.28em;text-transform:uppercase;
  color:var(--muted);
  opacity:0;animation:fadeIn .6s .35s forwards;
}

/* scan line on left */
.left-scan{
  position:absolute;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--c),transparent);
  opacity:.18;
  animation:scanMove 6s linear infinite;
  pointer-events:none;
}
@keyframes scanMove{from{top:-2px}to{top:calc(100% + 2px)}}

/* ── RIGHT PANEL: content ── */
.right{
  display:flex;flex-direction:column;
  justify-content:center;
  padding:3rem 4vw 3rem 4vw;
  gap:0;
}

/* top micro-tag */
.micro{
  font-size:.42rem;letter-spacing:.36em;text-transform:uppercase;
  color:var(--c);
  display:flex;align-items:center;gap:.6rem;
  margin-bottom:2.4rem;
  opacity:0;animation:slideR .6s .3s forwards;
}
@keyframes slideR{from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:none}}
.ldot{
  width:5px;height:5px;border-radius:50%;
  background:var(--p);box-shadow:0 0 7px var(--p);
  animation:ldotP 1.3s ease-in-out infinite;
}
@keyframes ldotP{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.1;transform:scale(.5)}}

/* ── GLITCH TITLE ── */
.title-wrap{
  position:relative;display:inline-block;
  margin-bottom:.8rem;
  opacity:0;animation:slideR .8s .42s forwards;
}
h1{
  font-family:'Exo 2',sans-serif;
  font-weight:100;
  font-size:clamp(2.4rem,4.2vw,4rem);
  letter-spacing:.04em;line-height:.95;
  text-transform:uppercase;
  color:var(--ink);
  position:relative;display:inline-block;
  animation:hGlitch 4.5s infinite;
}
@keyframes hGlitch{
  0%,90%,100%{transform:none;filter:none}
  91%{transform:translate(-3px,0) skewX(-2deg);filter:blur(.25px)}
  92.5%{transform:translate(2px,0)}93%{transform:none;filter:none}
  96%{transform:translate(-2px,.5px)}96.5%{transform:none}
}
h1::before{
  content:attr(data-t);position:absolute;inset:0;
  color:var(--p);mix-blend-mode:screen;
  clip-path:polygon(0 5%,100% 5%,100% 40%,0 40%);
  animation:h1p 4.5s infinite;
}
h1::after{
  content:attr(data-t);position:absolute;inset:0;
  color:var(--c);mix-blend-mode:screen;
  clip-path:polygon(0 60%,100% 60%,100% 95%,0 95%);
  animation:h1c 4.5s infinite;
}
@keyframes h1p{
  0%,90%,100%{opacity:0}
  91%{opacity:.9;transform:translate(-7px,0)}92.5%{opacity:.9;transform:translate(5px,0)}
  93%{opacity:0}96%{opacity:.65;transform:translate(-4px,0)}96.5%{opacity:0}
}
@keyframes h1c{
  0%,90%,100%{opacity:0}
  91%{opacity:.9;transform:translate(7px,0)}92.5%{opacity:.9;transform:translate(-5px,0)}
  93%{opacity:0}96%{opacity:.65;transform:translate(4px,0)}96.5%{opacity:0}
}
.sl{position:absolute;left:-1%;width:102%;pointer-events:none;animation:sliceF 4.5s infinite}
.sl1{top:24%;height:2px;background:var(--p)}
.sl2{top:70%;height:1px;background:var(--c);animation-delay:.04s}
@keyframes sliceF{
  0%,90%,100%{opacity:0;transform:scaleX(0)}
  91%{opacity:.65;transform:scaleX(1) translateX(-5px)}
  92%{opacity:.35;transform:scaleX(.5) translateX(7px)}92.5%{opacity:0}
  96%{opacity:.3;transform:scaleX(.28) translateX(-5px)}96.5%{opacity:0}
}

/* subtitle */
.sub{
  font-family:'Exo 2',sans-serif;
  font-weight:100;font-style:italic;
  font-size:clamp(.9rem,1.4vw,1.15rem);
  letter-spacing:.06em;
  color:var(--muted);
  margin-bottom:3rem;
  opacity:0;animation:slideR .6s .55s forwards;
}

/* ── SEPARATOR ── */
.sep{
  display:flex;align-items:center;gap:.8rem;
  margin-bottom:2.4rem;
  opacity:0;animation:slideR .5s .65s forwards;
}
.sep-line{
  flex:1;max-width:120px;height:1px;
  background:linear-gradient(90deg,var(--y),transparent);
}
.sep-diamond{
  width:5px;height:5px;
  background:var(--y);
  transform:rotate(45deg);
  box-shadow:0 0 6px var(--y);
  animation:diamondP 2s ease-in-out infinite;
}
@keyframes diamondP{0%,100%{opacity:1}50%{opacity:.3}}

/* ── STATUS ── */
.status{
  display:flex;flex-direction:column;gap:.8rem;
  margin-bottom:2.8rem;
  opacity:0;animation:slideR .6s .75s forwards;
}
.svc{
  display:flex;align-items:center;justify-content:space-between;
  gap:1rem;
}
.svc-left{display:flex;align-items:center;gap:.65rem}
.svc-bar{
  width:2px;height:14px;border-radius:1px;flex-shrink:0;
}
.svc-bar.r{background:var(--p);box-shadow:0 0 6px var(--p)}
.svc-bar.a{background:var(--o);box-shadow:0 0 6px var(--o)}
.svc-bar.g{background:var(--g);box-shadow:0 0 6px var(--g)}
.svc-name{
  font-size:.48rem;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);
}
.svc-status{
  font-family:'Exo 2',sans-serif;
  font-size:.62rem;font-weight:300;letter-spacing:.16em;text-transform:uppercase;
}
.svc-status.r{color:var(--p)}
.svc-status.a{color:var(--o)}
.svc-status.g{color:var(--g)}
.svc-dot{
  width:4px;height:4px;border-radius:50%;flex-shrink:0;
  animation:sdP 2s ease-in-out infinite;
}
.svc-dot.r{background:var(--p);box-shadow:0 0 5px var(--p);animation-duration:1.1s}
.svc-dot.a{background:var(--o);box-shadow:0 0 5px var(--o);animation-duration:1.7s}
.svc-dot.g{background:var(--g);box-shadow:0 0 5px var(--g)}
@keyframes sdP{0%,100%{opacity:1}50%{opacity:.15}}

/* ── PROGRESS ── */
.prog{opacity:0;animation:slideR .6s .9s forwards}
.prog-head{
  display:flex;justify-content:space-between;align-items:baseline;
  margin-bottom:.6rem;
}
.prog-key{font-size:.42rem;letter-spacing:.26em;text-transform:uppercase;color:var(--muted)}
.prog-pct{
  font-family:'Exo 2',sans-serif;
  font-size:1.1rem;font-weight:200;letter-spacing:.04em;color:var(--ink);
}
.track{height:1px;background:rgba(240,238,230,.07);position:relative;overflow:visible}
.fill{
  position:absolute;top:0;left:0;height:100%;
  background:linear-gradient(90deg,var(--c),var(--g));
  box-shadow:0 0 12px rgba(0,212,255,.3);
  animation:fillG 14s cubic-bezier(.4,0,.2,1) infinite alternate,fillGlitch 4.5s infinite;
}
@keyframes fillG{0%{width:5%}20%{width:27%}55%{width:57%}80%{width:76%}100%{width:89%}}
@keyframes fillGlitch{
  0%,90%,100%{box-shadow:0 0 12px rgba(0,212,255,.3)}
  91%{box-shadow:-4px 0 0 var(--p),4px 0 0 var(--g)}
  92.5%{box-shadow:0 0 12px rgba(0,212,255,.3)}
  96%{box-shadow:-2px 0 0 var(--p),2px 0 0 var(--g)}
  96.5%{box-shadow:0 0 12px rgba(0,212,255,.3)}
}
.fill-tip{position:absolute;right:-1px;top:-3px;width:1px;height:7px;background:var(--c);box-shadow:0 0 7px var(--c)}

/* ── BOTTOM META ── */
.bottom-meta{
  position:fixed;bottom:1.6rem;right:1.6rem;z-index:20;
  text-align:right;
  opacity:0;animation:fadeIn .6s .5s forwards;
}
.clock{font-size:.52rem;letter-spacing:.18em;color:var(--muted)}
.date{font-size:.42rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(240,238,230,.18);margin-top:.25rem}

/* ── TOP RULES ── */
.rule{position:fixed;top:0;left:0;right:0;height:2px;z-index:50;
  background:linear-gradient(90deg,var(--y),var(--p),var(--c),var(--g),var(--o));
  animation:ruleGlitch 4.5s infinite;
}
@keyframes ruleGlitch{
  0%,90%,100%{transform:none;filter:none}
  91%{transform:scaleX(1.003) translateX(-3px);filter:brightness(1.8)}
  93%{transform:none;filter:none}
  96%{transform:scaleX(.997) translateX(2px);filter:brightness(1.4)}
  97%{transform:none}
}

/* ── MOBILE ── */
@media(max-width:680px){
  .layout{
    grid-template-columns:1fr;
    grid-template-rows:auto 1px auto;
  }
  .vdiv{
    background:linear-gradient(90deg,transparent,var(--c),var(--p),transparent);
    height:1px;
    opacity:.22;
    animation:none;
  }
  .left{
    height:220px;
    padding-top:2.8rem;
  }
  .geo-wrap{
    width:160px;height:160px;
  }
  .left-tag{display:none}
  .left-scan{display:none}

  .right{
    padding:2rem 1.6rem 4rem;
  }
  .micro{margin-bottom:1.6rem;font-size:.38rem;letter-spacing:.26em}
  h1{font-size:clamp(2rem,9.5vw,3rem);letter-spacing:.03em}
  .sub{font-size:.78rem;margin-bottom:2rem}
  .sep{margin-bottom:1.8rem}
  .status{margin-bottom:2rem;gap:.75rem}
  .svc-name{font-size:.42rem;letter-spacing:.16em}
  .svc-status{font-size:.55rem}
  .prog-key{font-size:.38rem;letter-spacing:.18em}
  .prog-pct{font-size:.95rem}
  .bottom-meta{bottom:1rem;right:1.2rem}
  .clock{font-size:.46rem}
  .date{font-size:.38rem}
}

@media(max-width:380px){
  h1{font-size:clamp(1.6rem,8.5vw,2.2rem)}
  .right{padding:1.6rem 1.2rem 3.5rem}
  .geo-wrap{width:130px;height:130px}
  .left{height:190px}
}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="rule"></div>

<div class="layout">

  <!-- LEFT: geometric -->
  <div class="left">
    <div class="left-scan"></div>

    <div class="geo-wrap">
      <svg viewBox="-100 -100 200 200" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <filter id="glow">
            <feGaussianBlur stdDeviation="1.5" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>

        <!-- outer ring: dashed hexagon -->
        <g class="ring-outer" filter="url(#glow)">
          <polygon points="0,-88 76.2,-44 76.2,44 0,88 -76.2,44 -76.2,-44"
            fill="none" stroke="#00d4ff" stroke-width=".6"
            stroke-dasharray="8 5" opacity=".5"/>
          <!-- tick marks at vertices -->
          <line x1="0" y1="-88" x2="0" y2="-80" stroke="#00d4ff" stroke-width="1" opacity=".7"/>
          <line x1="76.2" y1="-44" x2="69.6" y2="-40.2" stroke="#00d4ff" stroke-width="1" opacity=".7"/>
          <line x1="76.2" y1="44" x2="69.6" y2="40.2" stroke="#00d4ff" stroke-width="1" opacity=".7"/>
          <line x1="0" y1="88" x2="0" y2="80" stroke="#00d4ff" stroke-width="1" opacity=".7"/>
          <line x1="-76.2" y1="44" x2="-69.6" y2="40.2" stroke="#00d4ff" stroke-width="1" opacity=".7"/>
          <line x1="-76.2" y1="-44" x2="-69.6" y2="-40.2" stroke="#00d4ff" stroke-width="1" opacity=".7"/>
        </g>

        <!-- middle ring: square rotated -->
        <g class="ring-mid" filter="url(#glow)">
          <rect x="-46" y="-46" width="92" height="92" rx="2"
            fill="none" stroke="#ff2d78" stroke-width=".6"
            stroke-dasharray="4 6" opacity=".55"/>
          <!-- corner dots -->
          <circle cx="46" cy="-46" r="2" fill="#ff2d78" opacity=".6"/>
          <circle cx="46" cy="46"  r="2" fill="#ff2d78" opacity=".6"/>
          <circle cx="-46" cy="46" r="2" fill="#ff2d78" opacity=".6"/>
          <circle cx="-46" cy="-46"r="2" fill="#ff2d78" opacity=".6"/>
        </g>

        <!-- inner ring: circle -->
        <g class="ring-inner" filter="url(#glow)">
          <circle cx="0" cy="0" r="28"
            fill="none" stroke="#ffe600" stroke-width=".6"
            stroke-dasharray="3 4" opacity=".6"/>
          <!-- orbiting dot -->
          <circle cx="28" cy="0" r="2.5" fill="#ffe600" class="orbit-dot" opacity=".8"/>
        </g>

        <!-- crosshairs -->
        <line x1="-70" y1="0" x2="-32" y2="0" stroke="#00d4ff" stroke-width=".4" opacity=".2"/>
        <line x1="32" y1="0" x2="70" y2="0" stroke="#00d4ff" stroke-width=".4" opacity=".2"/>
        <line x1="0" y1="-70" x2="0" y2="-32" stroke="#00d4ff" stroke-width=".4" opacity=".2"/>
        <line x1="0" y1="32" x2="0" y2="70" stroke="#00d4ff" stroke-width=".4" opacity=".2"/>

        <!-- center -->
        <circle cx="0" cy="0" r="4" fill="#00ff94" class="center-dot" filter="url(#glow)"/>
        <circle cx="0" cy="0" r="8" fill="none" stroke="#00ff94" stroke-width=".5" opacity=".3"/>

        <!-- small floating labels around ring -->
        <text x="10" y="-90" fill="#00d4ff" font-size="5" opacity=".5" font-family="Space Mono">N-07</text>
        <text x="78" y="-50" fill="#ff2d78" font-size="5" opacity=".5" font-family="Space Mono" transform="rotate(-30,78,-50)">503</text>
        <text x="78" y="58" fill="#ff7a00" font-size="5" opacity=".5" font-family="Space Mono" transform="rotate(30,78,58)">ERR</text>
      </svg>
    </div>

    <div class="left-tag">Sys Viz // Node-07 // EU-W</div>
  </div>

  <!-- DIVIDER -->
  <div class="vdiv"></div>

  <!-- RIGHT: content -->
  <div class="right">

    <div class="micro">
      <div class="ldot"></div>
      Live &nbsp;·&nbsp; Service Interruption
    </div>

    <div class="title-wrap">
      <div class="sl sl1"></div>
      <div class="sl sl2"></div>
      <h1 data-t="Under Maintenance">Under<br>Maintenance</h1>
    </div>

    <p class="sub">Systems are being upgraded.<br>We'll be back shortly.</p>

    <div class="sep">
      <div class="sep-line"></div>
      <div class="sep-diamond"></div>
    </div>

    <div class="status">
      <div class="svc">
        <div class="svc-left">
          <div class="svc-bar r"></div>
          <span class="svc-name">Core API</span>
        </div>
        <div style="display:flex;align-items:center;gap:.5rem">
          <div class="svc-dot r"></div>
          <span class="svc-status r">Offline</span>
        </div>
      </div>
      <div class="svc">
        <div class="svc-left">
          <div class="svc-bar a"></div>
          <span class="svc-name">Auth Layer</span>
        </div>
        <div style="display:flex;align-items:center;gap:.5rem">
          <div class="svc-dot a"></div>
          <span class="svc-status a">Degraded</span>
        </div>
      </div>
      <div class="svc">
        <div class="svc-left">
          <div class="svc-bar g"></div>
          <span class="svc-name">CDN</span>
        </div>
        <div style="display:flex;align-items:center;gap:.5rem">
          <div class="svc-dot g"></div>
          <span class="svc-status g">Online</span>
        </div>
      </div>
    </div>

    <div class="prog">
      <div class="prog-head">
        <span class="prog-key">Restore Progress</span>
        <span class="prog-pct" id="pct">0%</span>
      </div>
      <div class="track">
        <div class="fill" id="fill">
          <div class="fill-tip"></div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- bottom-right meta -->
<div class="bottom-meta">
  <div class="clock" id="ct">00:00:00</div>
  <div class="date" id="dateEl">--</div>
</div>

<script>
/* ── CANVAS ── */
const cv=document.getElementById('bg'),ctx=cv.getContext('2d');
let W,H;
function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight}
resize();addEventListener('resize',resize);

const COLS=[[255,46,120],[0,212,255],[0,255,148],[255,230,0],[255,122,0]];

/* nodes */
const nodes=Array.from({length:25},()=>({
  x:Math.random()*W,y:Math.random()*H,
  vx:(Math.random()-.5)*.2,vy:(Math.random()-.5)*.2,
  col:COLS[Math.floor(Math.random()*COLS.length)]
}));

/* orbs */
const orbs=[
  {fx:.08,fy:.5, r:350,col:[0,212,255],  ph:0,  sp:.00024},
  {fx:.92,fy:.5, r:300,col:[255,46,120], ph:1.8,sp:.0003},
  {fx:.5, fy:.95,r:250,col:[0,255,148],  ph:.9, sp:.00027},
  {fx:.15,fy:.1, r:190,col:[255,230,0],  ph:2.2,sp:.0002},
  {fx:.85,fy:.08,r:170,col:[255,122,0],  ph:1.0,sp:.00022},
];

/* particles */
const pts=Array.from({length:60},()=>mkPt(true));
function mkPt(init){
  const c=COLS[Math.floor(Math.random()*COLS.length)];
  return{x:Math.random()*W,y:init?Math.random()*H:H+4,
    vx:(Math.random()-.5)*.28,vy:-(0.15+Math.random()*.38),
    r:.4+Math.random()*.9,life:0,ml:200+Math.random()*380,
    ma:.07+Math.random()*.15,a:0,col:c};
}

/* tears */
const tears=Array.from({length:4},mkTear);
function mkTear(){
  const c=COLS[Math.floor(Math.random()*COLS.length)];
  return{y:Math.random()*H,h:.8+Math.random()*2,life:0,ml:8+Math.random()*20,col:c};
}

let diagOff=0,sw=0,tt=0;

function frame(){
  ctx.clearRect(0,0,W,H);tt+=16;

  /* orbs */
  orbs.forEach(o=>{
    const ox=o.fx*W+Math.sin(tt*o.sp+o.ph)*50;
    const oy=o.fy*H+Math.cos(tt*o.sp*1.3+o.ph)*35;
    const g=ctx.createRadialGradient(ox,oy,0,ox,oy,o.r);
    g.addColorStop(0,`rgba(${o.col[0]},${o.col[1]},${o.col[2]},0.065)`);
    g.addColorStop(1,'transparent');
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  });

  /* diagonal lines */
  diagOff=(diagOff+.15)%80;
  ctx.strokeStyle='rgba(240,238,230,0.018)';ctx.lineWidth=.4;
  for(let d=diagOff-80;d<W+H;d+=80){
    ctx.beginPath();ctx.moveTo(d,0);ctx.lineTo(d-H,H);ctx.stroke();
  }

  /* node net */
  for(let i=0;i<nodes.length;i++){
    const a=nodes[i];
    for(let j=i+1;j<nodes.length;j++){
      const b=nodes[j],dx=a.x-b.x,dy=a.y-b.y,d=Math.sqrt(dx*dx+dy*dy);
      if(d<170){
        ctx.strokeStyle=`rgba(${a.col[0]},${a.col[1]},${a.col[2]},${(1-d/170)*0.065})`;
        ctx.lineWidth=.4;ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();
      }
    }
    ctx.beginPath();ctx.arc(a.x,a.y,1,0,Math.PI*2);
    ctx.fillStyle=`rgba(${a.col[0]},${a.col[1]},${a.col[2]},0.12)`;ctx.fill();
    a.x+=a.vx;a.y+=a.vy;
    if(a.x<-20)a.x=W+20;if(a.x>W+20)a.x=-20;
    if(a.y<-20)a.y=H+20;if(a.y>H+20)a.y=-20;
  }

  /* particles */
  pts.forEach((p,i)=>{
    p.x+=p.vx;p.y+=p.vy;p.life++;
    const f=p.life/p.ml;
    p.a=f<.12?p.ma*(f/.12):f>.78?p.ma*((1-f)/.22):p.ma;
    if(p.y<-8||p.life>p.ml)pts[i]=mkPt(false);
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(${p.col[0]},${p.col[1]},${p.col[2]},${p.a})`;ctx.fill();
  });

  /* tears */
  tears.forEach((t,i)=>{
    t.life++;if(t.life>t.ml){tears[i]=mkTear();return}
    const f=t.life/t.ml,a=f<.25?.055*(f/.25):f>.6?.055*(1-(f-.6)/.4):.055;
    ctx.fillStyle=`rgba(${t.col[0]},${t.col[1]},${t.col[2]},${a})`;
    ctx.fillRect(0,t.y,W,t.h);
  });

  /* sweep */
  sw=(sw+.8)%H;
  const sg=ctx.createLinearGradient(0,sw-65,0,sw+65);
  sg.addColorStop(0,'transparent');sg.addColorStop(.5,'rgba(240,238,230,0.015)');sg.addColorStop(1,'transparent');
  ctx.fillStyle=sg;ctx.fillRect(0,sw-65,W,130);

  requestAnimationFrame(frame);
}
frame();

/* ── CLOCK ── */
function tick(){
  const n=new Date();
  document.getElementById('ct').textContent=
    String(n.getHours()).padStart(2,'0')+':'+
    String(n.getMinutes()).padStart(2,'0')+':'+
    String(n.getSeconds()).padStart(2,'0');
  document.getElementById('dateEl').textContent=
    n.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}).toUpperCase();
  setTimeout(tick,1000);
}
tick();

/* ── PROGRESS ── */
const fillEl=document.getElementById('fill'),pctEl=document.getElementById('pct');
function syncPct(){
  const v=Math.round(fillEl.offsetWidth/fillEl.parentElement.offsetWidth*100);
  pctEl.textContent=v+'%';
  requestAnimationFrame(syncPct);
}
syncPct();
</script>
