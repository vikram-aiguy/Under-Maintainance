<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Offline // Maintenance</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;700&family=JetBrains+Mono:wght@400&display=swap');

        :root {
            /* Reverting to deep dark tech palette */
            --bg-base: #050505;
            --bg-accent: #0a0a0a;
            --bg-grid: rgba(255, 255, 255, 0.03);
            --text: #ffffff;
            --accent: #ff0000;
            --accent-purple: #a78bfa;
            --dim: rgba(255, 255, 255, 0.3);
            --font-sans: 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text);
            font-family: var(--font-sans);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* --- MODERN DARK TECH BACKGROUND --- */
        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), var(--bg-accent) 0%, var(--bg-base) 100%);
        }

        /* Subtle 3D Grid Animation */
        .grid-layer {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background-image: 
                linear-gradient(var(--bg-grid) 1px, transparent 1px),
                linear-gradient(90deg, var(--bg-grid) 1px, transparent 1px);
            background-size: 60px 60px;
            transform: perspective(1000px) rotateX(60deg) translateZ(0);
            animation: grid-move 50s linear infinite;
            pointer-events: none;
            opacity: 0.5;
        }

        @keyframes grid-move {
            from { transform: perspective(1000px) rotateX(60deg) translateY(0); }
            to { transform: perspective(1000px) rotateX(60deg) translateY(60px); }
        }

        /* Vertical "Data Drift" Background Animation */
        .data-drift {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0.15;
            overflow: hidden;
        }

        .drift-line {
            position: absolute;
            width: 1px;
            height: 100px;
            background: linear-gradient(to bottom, transparent, var(--text), transparent);
            animation: fall linear infinite;
        }

        @keyframes fall {
            from { transform: translateY(-100px); }
            to { transform: translateY(110vh); }
        }

        #trail-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        .container {
            text-align: center;
            z-index: 10;
        }

        /* --- REFINED MINIMAL GLITCH --- */
        .glitch {
            font-size: clamp(3.5rem, 10vw, 6rem);
            font-weight: 700;
            text-transform: uppercase;
            position: relative;
            letter-spacing: -0.02em;
            line-height: 1;
            display: inline-block;
        }

        .glitch::before,
        .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            opacity: 0.8;
        }

        .glitch::before {
            left: 3px;
            text-shadow: -2px 0 var(--accent), -1px 0 var(--accent);
            clip-path: inset(80% 0 0 0);
            animation: glitch-refined-red 5s infinite linear alternate-reverse;
        }

        .glitch::after {
            left: -2px;
            text-shadow: 1px 0 #00ffff;
            clip-path: inset(0 0 80% 0);
            animation: glitch-refined-cyan 3.5s infinite linear alternate-reverse;
            opacity: 0.4;
        }

        @keyframes glitch-refined-red {
            0% { clip-path: inset(20% 0 30% 0); transform: translate(-3px, 1px); }
            2% { clip-path: inset(60% 0 10% 0); transform: translate(3px, -1px); }
            4% { clip-path: inset(40% 0 45% 0); transform: translate(0); }
            5% { clip-path: inset(100% 0 0 0); }
            45% { clip-path: inset(100% 0 0 0); }
            46% { clip-path: inset(10% 0 80% 0); transform: translate(-2px, 0); }
            47% { clip-path: inset(100% 0 0 0); }
            80% { clip-path: inset(100% 0 0 0); }
            81% { clip-path: inset(45% 0 45% 0); transform: translate(4px, 1px); text-shadow: -4px 0 var(--accent); }
            83% { clip-path: inset(100% 0 0 0); }
            100% { clip-path: inset(100% 0 0 0); }
        }

        @keyframes glitch-refined-cyan {
            0% { clip-path: inset(100% 0 0 0); }
            20% { clip-path: inset(100% 0 0 0); }
            21% { clip-path: inset(10% 0 85% 0); transform: translate(2px, 2px); }
            23% { clip-path: inset(80% 0 5% 0); transform: translate(-2px, -2px); }
            25% { clip-path: inset(100% 0 0 0); }
            60% { clip-path: inset(100% 0 0 0); }
            61% { clip-path: inset(30% 0 50% 0); transform: translate(-1px, 1px); }
            63% { clip-path: inset(100% 0 0 0); }
            100% { clip-path: inset(100% 0 0 0); }
        }

        /* --- DIAGNOSTIC BAR --- */
        .diagnostic-track {
            width: 200px;
            height: 2px;
            background: rgba(255, 255, 255, 0.05);
            margin: 2rem auto;
            position: relative;
            overflow: hidden;
        }

        .diagnostic-bar {
            position: absolute;
            height: 100%;
            width: 40px;
            background: var(--accent);
            box-shadow: 0 0 8px var(--accent);
            animation: diagnostic-sweep 4s infinite cubic-bezier(0.77, 0, 0.175, 1);
        }

        @keyframes diagnostic-sweep {
            0% { left: -50px; width: 20px; }
            30% { left: 40%; width: 60px; }
            35% { left: 38%; width: 65px; filter: hue-rotate(90deg); } 
            40% { left: 40%; width: 60px; filter: none; }
            70% { left: 100%; width: 20px; }
            100% { left: 100%; width: 20px; }
        }

        /* --- SYSTEM INFO --- */
        .info-wrapper {
            margin-top: 1.5rem;
            opacity: 0;
            animation: fadeIn 1s forwards 0.5s;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .status-line {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--dim);
            text-transform: uppercase;
            letter-spacing: 0.2em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .status-tag {
            color: var(--accent);
            position: relative;
            padding-left: 15px;
            display: flex;
            align-items: center;
        }

        .status-text {
            display: inline-block;
            min-width: 65px;
            text-align: left;
            font-weight: bold;
        }

        .status-tag::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.4); }
            70% { opacity: 0.5; box-shadow: 0 0 0 8px rgba(255, 0, 0, 0); }
            100% { opacity: 1; box-shadow: 0 0 0 0 rgba(255, 0, 0, 0); }
        }

        .divider {
            height: 40px;
            width: 1px;
            background: var(--dim);
            margin: 1rem auto;
        }

        /* --- FOOTER & IST CLOCK --- */
        .footer {
            position: absolute;
            bottom: 40px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            font-family: var(--font-mono);
            font-size: 0.65rem;
            color: var(--dim);
            text-transform: uppercase;
            z-index: 10;
        }

        #clock-container {
            color: var(--text);
            display: inline-flex;
            font-weight: bold;
            font-size: 0.65rem;
            letter-spacing: 0.05em;
        }

        .digit {
            display: inline-block;
            position: relative;
            min-width: 0.6em;
        }

        .digit-glitch {
            animation: digit-tick 0.2s ease-out;
        }

        @keyframes digit-tick {
            0% { transform: translate(0); color: var(--text); }
            20% { transform: translate(-1px, 1px); color: var(--accent-purple); filter: blur(0.5px); }
            40% { transform: translate(1px, -1px); color: #00ffff; }
            100% { transform: translate(0); color: var(--text); }
        }

        .scanline {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent 0%, rgba(255, 255, 255, 0.03) 50%, transparent 100%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 100;
            opacity: 0.15;
        }

        @media (max-width: 600px) {
            .footer { flex-direction: column; gap: 10px; align-items: center; bottom: 20px; }
        }
    </style>
</head>
<body>

    <div class="background-container">
        <div class="grid-layer" id="grid"></div>
        <div class="data-drift" id="drift-field"></div>
    </div>
    
    <canvas id="trail-canvas"></canvas>
    <div class="scanline"></div>

    <main class="container">
        <h1 class="glitch" data-text="OFFLINE">OFFLINE</h1>
        
        <div class="info-wrapper">
            <div class="status-line">
                <span>Core Maintenance</span>
                <span>//</span>
                <span class="status-tag">
                    <span id="status-scramble" class="status-text">Inactive</span>
                </span>
            </div>
        </div>

        <div class="diagnostic-track">
            <div class="diagnostic-bar"></div>
        </div>

        <p style="font-size: 0.8rem; color: var(--dim); max-width: 300px; margin: 0 auto; line-height: 1.5; font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.05em;">
            System protocol initiated. Restricted access active.
        </p>

        <div class="divider"></div>
    </main>

    <footer class="footer">
        <div>Node_v.71-B</div>
        <div>
            <span id="clock-container"></span> IST
        </div>
        <div>Loc_IN.JS</div>
    </footer>

    <script>
        // --- CLOCK LOGIC (IST 12hr) ---
        const clockContainer = document.getElementById('clock-container');
        let lastTimeStr = "";

        function updateClock() {
            const now = new Date();
            const istString = now.toLocaleTimeString('en-IN', { 
                timeZone: 'Asia/Kolkata', 
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit', 
                hour12: true 
            }).toLowerCase();
            
            if (istString.length !== lastTimeStr.length) {
                clockContainer.innerHTML = '';
                for (let i = 0; i < istString.length; i++) {
                    const span = document.createElement('span');
                    span.className = 'digit';
                    span.id = `digit-${i}`;
                    clockContainer.appendChild(span);
                }
            }
            
            for (let i = 0; i < istString.length; i++) {
                const char = istString[i];
                const span = document.getElementById(`digit-${i}`);
                if (char !== lastTimeStr[i]) {
                    span.textContent = char;
                    if (lastTimeStr !== "") {
                        span.classList.remove('digit-glitch');
                        void span.offsetWidth; 
                        span.classList.add('digit-glitch');
                    }
                }
            }
            lastTimeStr = istString;
            requestAnimationFrame(updateClock);
        }

        // --- BACKGROUND DRIFT ANIMATION ---
        function initDrift() {
            const field = document.getElementById('drift-field');
            const count = 15;
            for (let i = 0; i < count; i++) {
                const line = document.createElement('div');
                line.className = 'drift-line';
                line.style.left = `${Math.random() * 100}%`;
                line.style.animationDuration = `${Math.random() * 3 + 2}s`;
                line.style.animationDelay = `${Math.random() * 5}s`;
                line.style.opacity = Math.random() * 0.5;
                field.appendChild(line);
            }
        }

        // --- STATUS SCRAMBLE EFFECT ---
        const statusEl = document.getElementById('status-scramble');
        const originalText = "Inactive";
        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ#%&*@!$0123456789";

        function scrambleStatus() {
            let iteration = 0;
            const interval = setInterval(() => {
                statusEl.innerText = originalText.split("")
                    .map((letter, index) => index < iteration ? originalText[index] : chars[Math.floor(Math.random() * chars.length)])
                    .join("");
                if (iteration >= originalText.length) clearInterval(interval);
                iteration += 1 / 3;
            }, 30);
        }

        setInterval(() => { if (Math.random() > 0.7) scrambleStatus(); }, 4000);

        // --- PARALLAX EFFECT ---
        const grid = document.getElementById('grid');
        window.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth) * 100;
            const y = (e.clientY / window.innerHeight) * 100;
            document.body.style.setProperty('--mouse-x', `${x}%`);
            document.body.style.setProperty('--mouse-y', `${y}%`);
            
            const moveX = (e.clientX - window.innerWidth / 2) * 0.01;
            const moveY = (e.clientY - window.innerHeight / 2) * 0.01;
            grid.style.transform = `perspective(1000px) rotateX(60deg) translateX(${moveX}px) translateY(${moveY}px)`;
        });

        // --- MOUSE TRAIL LOGIC ---
        const canvas = document.getElementById('trail-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.size = Math.random() * 1.5 + 0.5;
                this.speedX = (Math.random() - 0.5) * 1.2;
                this.speedY = (Math.random() - 0.5) * 1.2;
                this.life = 1.0;
                this.decay = Math.random() * 0.015 + 0.01;
                this.color = Math.random() > 0.2 ? '#ff0000' : '#ffffff';
            }
            update() { this.x += this.speedX; this.y += this.speedY; this.life -= this.decay; }
            draw() {
                ctx.fillStyle = this.color; ctx.globalAlpha = this.life;
                ctx.fillRect(this.x, this.y, this.size, this.size);
            }
        }

        window.addEventListener('mousemove', (e) => { particles.push(new Particle(e.clientX, e.clientY)); });

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update(); particles[i].draw();
                if (particles[i].life <= 0) { particles.splice(i, 1); i--; }
            }
            requestAnimationFrame(animate);
        }

        initDrift();
        updateClock(); 
        animate();

        setInterval(() => {
            if(Math.random() > 0.995) {
                document.body.style.filter = 'invert(1) contrast(1.5)';
                setTimeout(() => document.body.style.filter = 'none', 40);
            }
        }, 1000);
    </script>
</body>
</html>
